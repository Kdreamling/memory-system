<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reverie Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1b1e;
      --surface: #25262b;
      --surface2: #2c2e33;
      --border: #373a40;
      --text: #c1c2c5;
      --text-dim: #6b6f7a;
      --accent: #4c6ef5;
      --accent-hover: #5c7cfa;
      --danger: #fa5252;
      --success: #51cf66;
      --thinking-bg: #1e2030;
      --thinking-border: #3b4060;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #topbar h1 {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      margin-right: 8px;
      letter-spacing: 0.5px;
    }
    #topbar input[type="password"] {
      flex: 1;
      max-width: 240px;
      padding: 6px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    #topbar input[type="password"]:focus { border-color: var(--accent); }
    #topbar select {
      padding: 6px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      outline: none;
      cursor: pointer;
    }
    button {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s, opacity 0.15s;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-ghost {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) { background: var(--surface2); color: var(--text); }

    #auth-status {
      margin-left: auto;
      font-size: 12px;
      color: var(--text-dim);
    }
    #auth-status.ok { color: var(--success); }
    #auth-status.err { color: var(--danger); }

    /* ── Main layout ── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #sidebar-header {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #sidebar-header label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-dim);
    }
    #scene-select {
      width: 100%;
      padding: 6px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      outline: none;
      font-size: 13px;
    }
    #btn-new-session { width: 100%; }

    #session-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px;
    }
    #session-list::-webkit-scrollbar { width: 4px; }
    #session-list::-webkit-scrollbar-track { background: transparent; }
    #session-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .session-item {
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 2px;
      border: 1px solid transparent;
      transition: background 0.1s, border-color 0.1s;
    }
    .session-item:hover { background: var(--surface2); }
    .session-item.active {
      background: rgba(76, 110, 245, 0.15);
      border-color: rgba(76, 110, 245, 0.4);
    }
    .session-item .s-id {
      font-size: 11px;
      color: var(--text-dim);
      font-family: monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-item .s-scene {
      font-size: 12px;
      color: var(--text);
      margin-bottom: 2px;
      font-weight: 500;
    }
    .session-item .s-time {
      font-size: 11px;
      color: var(--text-dim);
    }

    /* ── Chat area ── */
    #chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .msg {
      max-width: 80%;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 10px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 3px;
    }
    .msg.assistant .msg-bubble {
      background: var(--surface2);
      border-bottom-left-radius: 3px;
    }

    /* thinking block */
    .thinking-wrapper {
      width: 100%;
      max-width: 600px;
    }
    .thinking-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
      font-size: 12px;
      color: var(--text-dim);
      padding: 4px 0;
    }
    .thinking-toggle .arrow {
      display: inline-block;
      transition: transform 0.2s;
      font-size: 10px;
    }
    .thinking-toggle.collapsed .arrow { transform: rotate(-90deg); }
    .thinking-content {
      background: var(--thinking-bg);
      border: 1px solid var(--thinking-border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      color: #7c8aaa;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      margin-top: 4px;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .thinking-content.hidden { display: none; }

    /* streaming cursor */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--text);
      vertical-align: text-bottom;
      animation: blink 0.8s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* empty state */
    #empty-hint {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-size: 13px;
      flex-direction: column;
      gap: 8px;
    }
    #empty-hint .big { font-size: 32px; }

    /* ── Input bar ── */
    #input-bar {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      background: var(--surface);
    }
    #msg-input {
      flex: 1;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      resize: none;
      outline: none;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.5;
      min-height: 44px;
      max-height: 160px;
      transition: border-color 0.15s;
    }
    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--text-dim); }
    #btn-send { align-self: flex-end; padding: 10px 20px; }

    /* session id display */
    #session-indicator {
      padding: 6px 16px;
      font-size: 11px;
      color: var(--text-dim);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #session-indicator span { font-family: monospace; color: var(--accent); }

    /* toast */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      color: #fff;
      background: #333;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 999;
    }
    #toast.show { opacity: 1; }
    #toast.error { background: var(--danger); }
    #toast.success { background: var(--success); color: #111; }
  </style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <h1>Reverie</h1>
  <input type="password" id="pw-input" placeholder="密码" />
  <button class="btn-primary" id="btn-login">登录</button>
  <select id="model-select">
    <option value="deepseek-chat">deepseek-chat</option>
    <option value="deepseek-reasoner">deepseek-reasoner</option>
    <option value="[0.1]claude-opus-4-6-thinking">claude-opus-4.6 (dzzi)</option>
    <option value="anthropic/claude-opus-4.6">claude-opus-4.6 (openrouter)</option>
  </select>
  <span id="auth-status">未登录</span>
</div>

<!-- Main -->
<div id="main">

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      <label>新建 Session</label>
      <select id="scene-select">
        <option value="daily">daily — 日常</option>
        <option value="code">code — 编程</option>
        <option value="roleplay">roleplay — 角色扮演</option>
        <option value="reading">reading — 阅读</option>
      </select>
      <button class="btn-primary" id="btn-new-session" disabled>+ 新建</button>
    </div>
    <div id="session-list">
      <div style="padding:12px;font-size:12px;color:var(--text-dim);">登录后加载 sessions</div>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat-area">
    <div id="session-indicator">
      当前 Session：<span id="current-session-id">—</span>
    </div>
    <div id="messages">
      <div id="empty-hint">
        <div class="big">💬</div>
        <div>选择或新建一个 Session 开始对话</div>
      </div>
    </div>
    <div id="input-bar">
      <textarea id="msg-input" placeholder="输入消息，Enter 发送，Shift+Enter 换行" rows="1" disabled></textarea>
      <button class="btn-primary" id="btn-send" disabled>发送</button>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
  // ── State ──
  let token = localStorage.getItem('reverie_token') || null;
  let currentSessionId = null;
  let sessions = [];
  let isStreaming = false;

  // ── DOM refs ──
  const pwInput = document.getElementById('pw-input');
  const btnLogin = document.getElementById('btn-login');
  const modelSelect = document.getElementById('model-select');
  const authStatus = document.getElementById('auth-status');
  const btnNewSession = document.getElementById('btn-new-session');
  const sceneSelect = document.getElementById('scene-select');
  const sessionList = document.getElementById('session-list');
  const messagesEl = document.getElementById('messages');
  const emptyHint = document.getElementById('empty-hint');
  const currentSessionIdEl = document.getElementById('current-session-id');
  const msgInput = document.getElementById('msg-input');
  const btnSend = document.getElementById('btn-send');

  // ── Toast ──
  function toast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show ' + type;
    clearTimeout(el._t);
    el._t = setTimeout(() => el.className = '', 2500);
  }

  // ── Auth ──
  async function login() {
    const pw = pwInput.value.trim();
    if (!pw) { toast('请输入密码', 'error'); return; }
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      token = data.token || data.access_token;
      if (!token) throw new Error('响应中没有 token');
      localStorage.setItem('reverie_token', token);
      setLoggedIn(true);
      toast('登录成功', 'success');
      await loadSessions();
    } catch (e) {
      toast('登录失败：' + e.message, 'error');
      setLoggedIn(false);
    }
  }

  function setLoggedIn(ok) {
    authStatus.textContent = ok ? '已登录' : '未登录';
    authStatus.className = ok ? 'ok' : 'err';
    btnNewSession.disabled = !ok;
    if (!ok) {
      msgInput.disabled = true;
      btnSend.disabled = true;
    }
  }

  // Init auth state
  if (token) {
    setLoggedIn(true);
    loadSessions();
  }

  btnLogin.addEventListener('click', login);
  pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

  // ── Sessions ──
  async function loadSessions() {
    if (!token) return;
    try {
      const res = await fetch('/api/sessions', {
        headers: { 'Authorization': `Bearer ${token}` },
      });
      if (res.status === 401) { handleUnauth(); return; }
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      sessions = Array.isArray(data) ? data : (data.sessions || []);
      renderSessionList();
    } catch (e) {
      sessionList.innerHTML = `<div style="padding:10px;font-size:12px;color:var(--danger);">加载失败: ${e.message}</div>`;
    }
  }

  async function createSession() {
    if (!token) return;
    const scene = sceneSelect.value;
    try {
      const res = await fetch('/api/sessions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`,
        },
        body: JSON.stringify({ scene_type: scene }),
      });
      if (res.status === 401) { handleUnauth(); return; }
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const sess = await res.json();
      sessions.unshift(sess);
      renderSessionList();
      selectSession(sess);
      toast('Session 已创建', 'success');
    } catch (e) {
      toast('创建失败：' + e.message, 'error');
    }
  }

  function renderSessionList() {
    if (!sessions.length) {
      sessionList.innerHTML = '<div style="padding:10px;font-size:12px;color:var(--text-dim);">暂无 sessions</div>';
      return;
    }
    sessionList.innerHTML = sessions.map(s => {
      const id = s.session_id || s.id || '?';
      const scene = s.scene_type || 'daily';
      const ts = s.created_at ? new Date(s.created_at).toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }) : '';
      const active = id === currentSessionId ? 'active' : '';
      return `<div class="session-item ${active}" data-id="${id}" data-scene="${scene}">
        <div class="s-scene">${scene}</div>
        <div class="s-id">${id.slice(0,16)}…</div>
        ${ts ? `<div class="s-time">${ts}</div>` : ''}
      </div>`;
    }).join('');

    sessionList.querySelectorAll('.session-item').forEach(el => {
      el.addEventListener('click', () => {
        const s = sessions.find(x => (x.session_id || x.id) === el.dataset.id);
        if (s) selectSession(s);
      });
    });
  }

  function selectSession(sess) {
    currentSessionId = sess.session_id || sess.id;
    currentSessionIdEl.textContent = currentSessionId;
    msgInput.disabled = false;
    btnSend.disabled = false;
    // 如果 session 有记录的 model，同步到顶栏下拉框
    if (sess.model) {
      const opt = modelSelect.querySelector(`option[value="${CSS.escape(sess.model)}"]`);
      if (opt) modelSelect.value = sess.model;
    }
    // Clear messages
    messagesEl.innerHTML = '';
    emptyHint && emptyHint.remove();
    renderSessionList();
    loadMessages(currentSessionId);
    msgInput.focus();
  }

  btnNewSession.addEventListener('click', createSession);

  // ── 历史消息加载 ──
  async function loadMessages(sessionId) {
    try {
      const res = await fetch(`/api/sessions/${sessionId}/messages`, {
        headers: { 'Authorization': `Bearer ${token}` },
      });
      if (res.status === 401) { handleUnauth(); return; }
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const msgs = (data.messages || []).slice().reverse(); // 后端倒序，渲染需要正序
      for (const m of msgs) {
        if (m.user_msg) appendUserMsg(m.user_msg);
        if (m.assistant_msg) appendHistoryAssistantMsg(m.assistant_msg, m.thinking_summary || '');
      }
    } catch (e) {
      toast('历史消息加载失败：' + e.message, 'error');
    }
  }

  function appendHistoryAssistantMsg(text, thinkingSummary) {
    const wrapper = document.createElement('div');
    wrapper.className = 'msg assistant';

    if (thinkingSummary) {
      const thinkingWrapper = document.createElement('div');
      thinkingWrapper.className = 'thinking-wrapper';

      const toggle = document.createElement('div');
      toggle.className = 'thinking-toggle collapsed';
      toggle.innerHTML = '<span class="arrow">▼</span> 思考过程';

      const content = document.createElement('div');
      content.className = 'thinking-content hidden';
      content.textContent = thinkingSummary;

      toggle.addEventListener('click', () => {
        toggle.classList.toggle('collapsed');
        content.classList.toggle('hidden');
      });

      thinkingWrapper.appendChild(toggle);
      thinkingWrapper.appendChild(content);
      wrapper.appendChild(thinkingWrapper);
    }

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;
    wrapper.appendChild(bubble);

    messagesEl.appendChild(wrapper);
    scrollBottom();
  }

  // ── Input auto-resize ──
  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 160) + 'px';
  });

  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  btnSend.addEventListener('click', sendMessage);

  // ── Chat ──
  function appendUserMsg(text) {
    const div = document.createElement('div');
    div.className = 'msg user';
    div.innerHTML = `<div class="msg-bubble">${escHtml(text)}</div>`;
    messagesEl.appendChild(div);
    scrollBottom();
  }

  function createAssistantMsg() {
    const wrapper = document.createElement('div');
    wrapper.className = 'msg assistant';

    // thinking block
    const thinkingWrapper = document.createElement('div');
    thinkingWrapper.className = 'thinking-wrapper';
    thinkingWrapper.style.display = 'none';

    const toggle = document.createElement('div');
    toggle.className = 'thinking-toggle';
    toggle.innerHTML = '<span class="arrow">▼</span> 思考过程';
    toggle.addEventListener('click', () => {
      toggle.classList.toggle('collapsed');
      content.classList.toggle('hidden');
    });

    const content = document.createElement('div');
    content.className = 'thinking-content';

    thinkingWrapper.appendChild(toggle);
    thinkingWrapper.appendChild(content);

    // text bubble
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    bubble.appendChild(cursor);

    wrapper.appendChild(thinkingWrapper);
    wrapper.appendChild(bubble);
    messagesEl.appendChild(wrapper);
    scrollBottom();

    return {
      appendThinking(t) {
        thinkingWrapper.style.display = 'block';
        content.textContent += t;
        scrollBottom();
      },
      appendText(t) {
        cursor.remove();
        bubble.textContent += t;
        bubble.appendChild(cursor);
        scrollBottom();
      },
      finish() {
        cursor.remove();
      },
    };
  }

  async function sendMessage() {
    if (isStreaming) return;
    if (!token) { toast('请先登录', 'error'); return; }
    if (!currentSessionId) { toast('请先选择 Session', 'error'); return; }

    const text = msgInput.value.trim();
    if (!text) return;

    msgInput.value = '';
    msgInput.style.height = 'auto';
    appendUserMsg(text);

    isStreaming = true;
    btnSend.disabled = true;
    msgInput.disabled = true;

    const msg = createAssistantMsg();

    try {
      const response = await fetch('/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`,
          'X-Session-Id': currentSessionId,
        },
        body: JSON.stringify({
          model: modelSelect.value,
          messages: [{ role: 'user', content: text }],
          stream: true,
        }),
      });

      if (response.status === 401) { handleUnauth(); return; }
      if (!response.ok) {
        const errText = await response.text();
        throw new Error(`HTTP ${response.status}: ${errText}`);
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete line

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const raw = line.slice(6).trim();
          if (raw === '[DONE]') { msg.finish(); continue; }
          if (!raw) continue;

          try {
            const event = JSON.parse(raw);
            handleEvent(event, msg);
          } catch (_) {
            // non-JSON data line, ignore
          }
        }
      }

      // flush remaining buffer
      if (buffer.startsWith('data: ')) {
        const raw = buffer.slice(6).trim();
        if (raw && raw !== '[DONE]') {
          try { handleEvent(JSON.parse(raw), msg); } catch (_) {}
        }
      }

      msg.finish();

    } catch (e) {
      msg.finish();
      toast('请求失败：' + e.message, 'error');
    } finally {
      isStreaming = false;
      btnSend.disabled = false;
      msgInput.disabled = false;
      msgInput.focus();
    }
  }

  function handleEvent(event, msg) {
    switch (event.type) {
      case 'thinking_start':
        break;
      case 'thinking_delta': {
        const delta = event.delta?.thinking || event.thinking || event.content || '';
        if (delta) msg.appendThinking(delta);
        break;
      }
      case 'thinking_end':
        break;
      case 'text_start':
        break;
      case 'text_delta': {
        const delta = event.delta?.text || event.text || event.content || '';
        if (delta) msg.appendText(delta);
        break;
      }
      case 'text_end':
        break;
      case 'done':
        msg.finish();
        break;
      default:
        // fallback: try to handle OpenAI-style chunks
        if (event.choices && event.choices[0]) {
          const c = event.choices[0];
          const d = c.delta || {};
          if (d.content) msg.appendText(d.content);
          if (d.reasoning_content) msg.appendThinking(d.reasoning_content);
        }
        break;
    }
  }

  // ── Helpers ──
  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function handleUnauth() {
    token = null;
    localStorage.removeItem('reverie_token');
    setLoggedIn(false);
    toast('登录已过期，请重新登录', 'error');
    isStreaming = false;
    btnSend.disabled = true;
    msgInput.disabled = true;
  }
</script>
</body>
